<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení - Hodnocení grafických prací</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Přihlášení</h1>
            <p class="subtitle">Hodnocení grafických prací</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="login">Login (jmeno.prijmeni):</label>
                    <input type="text" id="login" name="login" required placeholder="jan.novak">
                </div>
                
                <div class="form-group">
                    <label for="password">Heslo:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="key">Identifikační klíč:</label>
                    <input type="text" id="key" name="key" required placeholder="ABC12" maxlength="5" style="text-transform: uppercase;">
                </div>
                
                <button type="submit" class="btn btn-primary">Přihlásit se</button>
            </form>
        </div>
    </div>
</body>
</html>
